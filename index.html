<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sims 4 Kingdom Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🧬 Sims 4 Kingdom Calendar</h1>
        <div class="controls">
            <select id="kingdom-select"></select>
            <button onclick="prevSeason()">← Prev Season</button>
            <span id="season-year" style="font-size:1.4rem; font-weight:bold;"></span>
            <button onclick="nextSeason()">Next Season →</button>
            <button onclick="addEvent()">+ Add Event</button>
        </div>
    </header>

    <div class="main">
        <div id="calendar" class="calendar-grid"></div>

        <div class="sidebar">
            <h2>Upcoming Events</h2>
            <ul id="upcoming-list"></ul>

            <h2>My Sims &amp; Aging</h2>
            <div id="sims-list"></div>
            <button onclick="addSim()">+ Add Sim</button>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="event-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">New Event</h2>
            
            <select id="event-season"></select>
            <input type="number" id="event-day" min="1" max="30" placeholder="Day (1-30)">
            <input type="number" id="event-year" placeholder="Year">
            
            <input type="text" id="event-title" placeholder="Event name (e.g. Luna's Birthday)">
            <select id="event-type">
                <option value="birthday">Birthday (Gold)</option>
                <option value="social">Social Event (Blue)</option>
                <option value="festival">Festival (Purple)</option>
                <option value="holiday">Holiday (Red)</option>
                <option value="custom">Custom</option>
            </select>
            <textarea id="event-desc" placeholder="Description / Notes"></textarea>
            
            <div class="modal-buttons">
                <button onclick="saveEvent()">Save Event</button>
                <button onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
